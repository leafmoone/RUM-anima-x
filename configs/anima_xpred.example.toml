num_samples = 2
steps = 30
width = 1024
height = 1024
eps_floor = 1e-4
alphas = [0.0, 0.25, 0.5, 0.75, 1.0]
teacher_cfg = 1.0
decode_sample_images = true
sample_image_prefix = "compare"
tracker_log_sample_images = false
