# RUM Anima latent x-pred experiment config.
# 用法：
#   python scripts/dev/anima_rum_xpred_train.py --config configs/anima_xpred.example.toml
#   python scripts/dev/anima_rum_xpred_train.py build_cache  --config configs/anima_xpred.example.toml
#   python scripts/dev/anima_rum_xpred_train.py train_xpred  --config configs/anima_xpred.example.toml
#   python scripts/dev/anima_rum_xpred_train.py sample_xpred --config configs/anima_xpred.example.toml
#   python scripts/dev/anima_rum_xpred_train.py sample_compare --config configs/anima_xpred.example.toml
#   python scripts/dev/anima_rum_xpred_train.py chunked_rum --config configs/anima_xpred.example.toml
#
# 不写 subcommand 时执行下面的 command；写 subcommand 时以 CLI subcommand 为准。
command = "chunked_rum"

[chunked_rum]
# 自动 RUM 流程：
#   1. 按 chunk_size 从 prompts 里截取一段 prompt，构建该段 latent cache。
#   2. 立即用这一段 cache 训练 x-pred student。
#   3. 下一段训练会自动从上一段输出 checkpoint 初始化。
#   4. chunk-manifest.json 记录状态；resume=true 时已 complete 的 chunk 会跳过。
#
# 执行方式：
#   command = "chunked_rum"
# 或：
#   python scripts/dev/anima_rum_xpred_train.py chunked_rum --config configs/anima_xpred.example.toml

# rolling cache、分段训练输出和 manifest 的根目录。
chunk_root = "./anima-jlt-xpred-turbo10-chunks"

# 不使用 build_cache.prompt_sets 时，才需要显式设置 start_index/total_samples。
# 使用 prompt_sets 时，chunked_rum 会按各 set 的 start_index/num_samples 自动推导 chunk 计划。
# total_samples = 30000

# 每次 cache 一段多少样本，然后用这一段训练。
# 数值越大，cache 占盘越多；越小，切换 teacher/student 的频率越高。
chunk_size = 3000

# 第一段从 prompt 文件的哪个 index 开始；仅用于非 prompt_sets 模式。
# start_index = 69000

# 可选：只跑前 N 个 chunk，适合 smoke 或中断调试；删除表示一直跑完 total_samples。
# max_chunks = 1

# 可选：覆盖每个 chunk 的训练 optimizer step 数。
# 删除时沿用 [train_xpred] 的 max_train_steps/num_train_epochs 自动逻辑。
# train_steps_per_chunk = 250

# true 时每个 chunk 训练完成后删除对应 cache，省磁盘。
# 注意：删除后无法重新训练该 chunk，除非重新 build cache。
delete_cache_after_train = false

# true 时 chunked_rum 不再运行 build_cache，只验证预先准备的 cache 目录已存在。
prepared_cache_only = true

# true 时读取 chunk-manifest.json，跳过已 complete 的 chunk。
resume = true

[common]
# 设备；留空或删除时会自动选择 cuda/cpu。
# device = "cuda"

# 计算精度：真实 Anima 默认 bf16；toy smoke 可用 fp32。
mixed_precision = "bf16"

# Anima shifted sigma 的 flow shift。训练采样、teacher schedule、sampler 必须一致。
flow_shift = 3.0

# 全流程随机种子。cache 阶段会按 sample index 自动递增。
seed = 20260701

# true 时使用本项目内置 toy model，不加载真实 Anima 权重。
toy_smoke = false

# 真实 Anima adapter。一般不需要改。
adapter = "rum_xpred.adapters.anima_sd_scripts:create_adapter"

# 真实 Anima DiT teacher checkpoint。
dit = "models/anima/diffusion_models/anima-base-v1.0.safetensors"

# student 初始化 checkpoint；留空时 train_xpred 默认从 dit 初始化。
student_init = "./anima-xpred-turbo10-chunks/train/chunk-0022/xpred-adapter-checkpoint.safetensors"

# Qwen3 text encoder。当前真实 adapter 必须提供。
text_encoder = "models/anima/text_encoders/qwen_3_06b_base.safetensors"

# Anima/Qwen VAE。当前 RUM 链路只缓存 latent；VAE 主要为后续 preview decode 预留。
vae = "models/anima/vae/qwen_image_vae.safetensors"

# VAE decode 分块设置。显存紧张时可设为 256/512；删除表示不分块。
# vae_spatial_chunk_size = 512
vae_disable_cache = false

# negative prompt。teacher_cfg=1.0 时不会实际做双分支 CFG。
negative_prompt = ""

# 注意力实现：torch 最稳；安装对应依赖后可尝试 flash/sageattn/xformers。
attn_mode = "flash"

# 是否按 vendored Anima loader 的 FP8 路径加载。默认 false，先保证公式链路稳定。
fp8 = false
fp8_scaled = false

# true 时 text encoder 保留在 CPU，显存压力小但更慢。
text_encoder_cpu = false

[tracker]
# 默认关闭。打开后会记录 train/loss、train/grad_norm、train/lr 和有效 batch size。
tracker_enabled = false

# 可选实验追踪设置，默认关闭。
tracker_project = "rum-anima-xpred-jlt"
tracker_entity = ""
tracker_run_name = "anima-xpred-rum"

# 固定 run id 后，分 chunk 运行可继续写入同一个实验记录。
# 第一次使用某个 id 时会创建 run；之后 resume="allow" 会继续写入同一个 run。
tracker_run_id = "anima-xpred-rum-jlt-20260703"
tracker_resume = "allow"

tracker_mode = ""
tracker_tags = ["anima", "rum", "xpred"]
tracker_notes = "Anima latent x-pred RUM reflow experiment."

# true 时把当前 config/参数写入实验记录。
tracker_log_config = true

# 可选：本地评估脚本写出的 JSON。训练循环会读取其中的 fid/is。
# 示例 JSON: {"fid": 12.3, "is": 5.6}
# 当前项目训练本身只处理 latent，不会凭空计算 FID/IS。
# tracker_metrics_file = "./anima-xpred-train/eval-metrics.json"

# 每隔多少 optimizer step 读取一次 metrics file；0 表示不读取指标。
tracker_metrics_log_every = 0

[build_cache]
# prompt 文件，一行一个 prompt。cache 阶段只保存 latent 和 text conditioning。
prompts = "data/prompts/qat_prompts.txt"

# teacher endpoint cache 输出目录。turbo LoRA cache 不要和 base 30-step cache 混用。
cache_dir = "cache_data/150000"


# 只读取前 N 条 prompt；null 表示读取全部。
num_samples = 300000

# 从 prompt 文件的第几个样本开始，便于分块构建 cache。
start_index = 150000

# cache 构建 batch size。真实 adapter 会把多个 prompt 的 embedding 拼 batch 后一次跑 teacher schedule。
# 受 DiT + Qwen3 显存影响，建议从 1 或 2 开始试。
cache_batch_size = 54

# true 时已有 sample-xxxxxx.safetensors 会跳过，便于断点续建 cache。
skip_existing = true

# true 时启用内置固定分辨率分桶；样本会按 seed/index 随机但确定地写入 cache_dir/宽x高/。
# 具体 bucket 列表由代码固定，不需要在配置里手动指定。
bucket_enabled = true

# 生成 latent 对应的图像尺寸；必须能被 Anima/VAE latent scale 整除。
# bucket_enabled=false 时使用这里的单一尺寸；bucket_enabled=true 时这里仅作为非分桶兼容默认值。
width = 1024
height = 1024

# teacher 从 eps_latent 完整采样到 sigma=0 的步数。
teacher_steps = 10

# teacher CFG。默认 1.0，避免 teacher endpoint 已 guidance 后采样再二次 CFG。
teacher_cfg = 1.0

# 可选 teacher LoRA。这里使用 Anima Turbo LoRA 作为少步数 teacher 实验。
teacher_lora = "models/anima/anima-turbo-lora-v0.2.safetensors"

# teacher LoRA 权重。
teacher_lora_weight = 1.0

# 可选：多 prompt set 构建。启用时会忽略上面的 prompts/cache_dir/start_index/num_samples，
# 每个 set 写入自己的 cache_dir，允许不同 prompt 文件从 sample-000000 开始而不重名。
# chunked_rum 下会自动在每个 cache_dir 后追加 chunk-XXXX。
#
# [[build_cache.prompt_sets]]
# name = "multicap_mix_30k"
# prompts = "data/prompts/qat_prompts_anime_multicap_mix_30k.txt"
# cache_dir = "./cache_mix/multicap_mix_30k"
# start_index = 0
# num_samples = 30000
# repeat 只增加等效训练长度；第一轮之后会复用/链接已有 cache，不会重新跑教师生成。
# repeat = 1
# cache_chunk_offset = 0

# [[build_cache.prompt_sets]]
# name = "short_nl"
# prompts = "./data/prompts/qat_prompts_chars_short_vibes_few_words_50k.txt"
# cache_dir = "./cache_mix/short_nl"
# start_index = 0
# num_samples = 50000
# repeat = 1
# cache_chunk_offset = 0


# [[build_cache.prompt_sets]]
# name = "long_names_10k"
# prompts = "./data/prompts/qat_prompts_long_names_10k.txt"
# cache_dir = "./cache_mix/long_names_10k"
# start_index = 0
# num_samples = 10000
# repeat = 5
# cache_chunk_offset = 0

# [[build_cache.prompt_sets]]
# name = "long_no_names_10k"
# prompts = "./data/prompts/qat_prompts_long_no_names_10k.txt"
# cache_dir = "./cache_mix/long_no_names_10k"
# start_index = 0
# num_samples = 10000
# repeat = 5
# cache_chunk_offset = 0

[[build_cache.prompt_sets]]
name = "min_individual_json_flat_10k"
prompts = "./data/prompts/qat_prompts_min_individual_json_flat_10k.txt"
cache_dir = "./cache_mix/min_individual_json_flat_10k"
start_index = 4576
num_samples = 5424
repeat = 5
cache_chunk_offset = 0

[train_xpred]
# build_cache 输出的 safetensors cache 目录。
cache_dir = "cache_data/anima-xpred-turbo10-cache"

# 可选：多个 cache 目录混合训练。启用 cache_dirs 后会忽略 cache_dir。
# chunked_rum + build_cache.prompt_sets 会自动填入每个 set 的当前 chunk 目录。
# 单独 train_xpred 时可手动写入目录。
# cache_dirs = [
#   "./cache_mix/tag/chunk-0000",
#   "./cache_mix/short_nl/chunk-0000",
# ]
# cache_mix_mode = "batch_weighted"
# cache_mix_weights = [0.5, 0.5]

# x-pred checkpoint 输出目录。
output_dir = "./anima-xpred-train"

# 训练 epoch 数。max_train_steps 未设置时，会按 cache 样本数和有效 batch 自动计算。
num_train_epochs = 1.0

# 显式 optimizer step 数；取消注释后会覆盖 num_train_epochs 自动计算。
# max_train_steps = 7500

# 每个 micro step 从 cache 读取多少样本。
train_batch_size = 8

# 梯度累积步数。有效 batch = train_batch_size * gradient_accumulation_steps。
gradient_accumulation_steps = 4

# 全量 DiT 转换默认小学习率。
learning_rate = 1e-5

# 学习率调度：constant 或 cosine。
lr_scheduler = "cosine"

# warmup optimizer steps。
lr_warmup_steps = 1000

# cosine 最低学习率比例，例如 0.1 表示最低到 learning_rate * 0.1。
lr_cosine_min = 0.3

# cosine 总步数；普通 train_xpred 未设置时使用本次训练步数。
# chunked_rum 未设置时会自动估算所有 chunk 的总 optimizer step，避免每个块重置衰减。
# lr_scheduler_total_steps = 100000

# AdamW optimizer 参数。
weight_decay = 0.0
adam_beta1 = 0.9
adam_beta2 = 0.999
adam_epsilon = 1e-8

# 梯度裁剪；0 表示不裁剪。
max_grad_norm = 1.0

# 训练 sigma 下界。太接近 0 时 sampler 的 (z - x) / sigma 会放大误差。
sigma_min_train = 0.02

# time_sampling:
#   "uniform_shifted"  = 直接在实际 Anima shifted sigma 的 [sigma_min_train, 1] 均匀采样。
#   "jlt_logit_normal" = 复刻 JLT 的 t=sigmoid(N(P_mean,P_std))，再映射到 Anima sigma=1-t。
time_sampling = "jlt_logit_normal"
time_sampling_logit_mean = -0.8
time_sampling_logit_std = 0.8

# loss_weighting:
#   "none"                 = 直接 MSE(x_pred, x_teacher_latent)，当前 RUM x-pred 默认。
#   "jlt_velocity_readout" = 复刻 JLT x-pred 训练损失：先用 (z - x_pred) / sigma 读出 Anima velocity，
#                            再与 target velocity 做 MSE，等价于按 1/sigma^2 加权 clean error。
loss_weighting = "jlt_velocity_readout"

# JLT 论文代码 t_eps 默认 5e-2；在 Anima 变量中就是 sigma 分母 floor。
# 仅 loss_weighting="jlt_velocity_readout" 时影响训练 loss。
loss_eps_floor = 5e-2

# true 时训练按随机顺序循环 cache。
shuffle_cache = true

# true 时 cache 数量不足一个 batch 的尾部会丢弃并进入下一轮。
drop_last = false

# 每隔多少 step 打印 loss。
log_every = 1

# 周期保存 checkpoint；删除或注释表示只保存最终 checkpoint。
save_every_steps = 1000

# 周期 checkpoint 保留数量；删除或注释表示不自动删除旧 checkpoint。
checkpoints_total_limit = 3

# Anima DiT 训练梯度检查点。省显存但会变慢。
gradient_checkpointing = true

# CPU offload 更省显存但明显更慢；先保持 false。
gradient_checkpointing_cpu_offload = false

# Anima block 支持的 unsloth offload 路径；实验参数，默认 false。
gradient_checkpointing_unsloth_offload = false

# 训练中自动 sample。0 表示关闭；例如 1000 表示每 1000 个 optimizer step 采样一次。
sample_every_steps = 50

# 训练中 sample 使用的 prompt。真实 Anima sample 必须设置；toy smoke 可为空。
sample_prompt = 'hatsune miku, 1girl, :3, aqua eyes, aqua hair, aqua nails, aqua necktie, aqua ribbon, bandaid, bandaid on leg, belt, character doll, closed mouth, doll, drop shadow, feet out of frame, fuwapuchi, hair between eyes, heart, holding, long hair, long sleeves, looking at viewer, miku day, necktie, ribbon, shadow, shirt, simple background, smile, socks, solo, spring onion, star \(symbol\), stuffed toy, thigh strap, twintails, very long hair, white background'

# 训练中 sample 的步数、数量、尺寸。sample_width/height 删除或注释时默认使用训练尺寸。
sample_steps = 30
sample_num_samples = 4
# 不加 LoRA 的普通 sample CFG。1.0 表示无 CFG 双分支。
sample_cfg = 4.0
sample_eps_floor = 1e-4
# sample_width = 1024
# sample_height = 1024

# 训练中 sample seed；删除或注释时使用 [common].seed。
# sample_seed = 20260701

# 训练中 sample 输出目录；删除或留空时写到 output_dir/train-samples。
# sample_output_dir = "./anima-xpred-train/train-samples"

# true 时训练中 sample 会用 VAE decode PNG。
sample_decode_images = true
sample_image_prefix = "xpred-train-sample"
sample_tracker_log_images = false

# 普通训练 sample 的 LoRA 分支；"__inherit__" 表示继承 [build_cache].teacher_lora。
# 会额外保存/上传一组 sample-lora 图，用来检查加速 LoRA 对当前 x-pred student 的影响。
sample_lora = "__inherit__"
sample_lora_weight = 1.0
sample_lora_steps = 10
# 加 LoRA 分支的 sample CFG。删除或设为 null 时继承 sample_cfg。
sample_lora_cfg = 1.0
sample_lora_eps_floor = 1e-4

# 训练中自动 sample_compare。0 表示关闭；开启后用同一个当前 student 生成：
#   fm：把当前输出当 FM/v 预测采样
#   x：把当前输出当 clean latent x 预测采样
#   fm_lora / x_lora：在当前 student 临时叠加 sample_compare_lora 后分别采样
sample_compare_every_steps = 0

# 训练中 sample_compare prompt；留空时复用 sample_prompt。
sample_compare_prompt = ''

# 训练中 sample_compare 的步数、数量、尺寸。宽高留空时依次复用 sample_width/height 或训练尺寸。
sample_compare_steps = 10
sample_compare_num_samples = 2
# sample_compare 中 fm/x 两个非 LoRA 分支的 CFG。
sample_compare_cfg = 1.0
sample_compare_eps_floor = 1e-4
# sample_compare_width = 1024
# sample_compare_height = 1024
# sample_compare_seed = 20260701

# 可选：把已经生成的 teacher/alpha-0 基准图移动到 compare-baseline。
# 只会在本次进程第一次训练中 compare 时导入一次。
sample_compare_baseline_source_dir = "./compare-baseline"
sample_compare_baseline_output_dir = "./compare-baseline"
sample_compare_baseline_tracker_log_images = false

# 训练中 compare 的 LoRA 分支；"__inherit__" 表示继承 [build_cache].teacher_lora。
# 设为 "" 可只生成 fm/x 两张，不生成 fm_lora/x_lora。
sample_compare_lora = "__inherit__"
sample_compare_lora_weight = 1.0
# sample_compare 中 fm_lora/x_lora 两个 LoRA 分支的 CFG。删除或设为 null 时继承 sample_compare_cfg。
sample_compare_lora_cfg = 1.0

# 可选 sanity：同一 prompt/noise/steps 下跑 teacher，确认 schedule/LoRA 本身能正常出图。
sample_compare_teacher_sanity = true
sample_compare_teacher_sanity_lora = "__inherit__"
sample_compare_teacher_sanity_lora_weight = 1.0

# 输出目录留空时写到 output_dir/train-compare-samples/step-XXXXXX。
# sample_compare_output_dir = "./anima-xpred-train/train-compare-samples"
sample_compare_decode_images = true
sample_compare_image_prefix = "compare-train"
sample_compare_tracker_log_images = false

# true 时只跑一个 optimizer step、打印统计，不保存 checkpoint。
dry_run = false

[sample_xpred]
# train_xpred 输出的 x-pred checkpoint。不能用旧 FM sampler 加载这个文件采样。
checkpoint = "./anima-xpred-train/xpred-adapter-checkpoint.safetensors"

# 当前 sampler 输出 final latent tensor，不直接 decode 成图片。
output = "./anima-xpred-train/sample-latent.pt"

# 专用 x-pred sampler 的 prompt。
prompt = 'hatsune miku, 1girl, :3, aqua eyes, aqua hair, aqua nails, aqua necktie, aqua ribbon, bandaid, bandaid on leg, belt, character doll, closed mouth, doll, drop shadow, feet out of frame, fuwapuchi, hair between eyes, heart, holding, long hair, long sleeves, looking at viewer, miku day, necktie, ribbon, shadow, shirt, simple background, smile, socks, solo, spring onion, star \(symbol\), stuffed toy, thigh strap, twintails, very long hair, white background'

# 一次采样几个 latent，使用同一个 prompt、不同 seed offset。
num_samples = 2

# x-pred Euler 采样步数。
steps = 30

# 采样尺寸，需与目标 latent shape 对应。
width = 1024
height = 1024

# v=(z-x)/sigma 的分母保护；terminal sigma=0 不会前向。
eps_floor = 1e-4

# true 时用 Anima/Qwen VAE 把 sampled latent 解码成 PNG。
decode_sample_images = true

# 解码图片输出目录；删除或留空时使用 output 去掉后缀后的同名目录。
sample_image_dir = "./anima-xpred-train/sample-images"

# PNG 文件名前缀。
sample_image_prefix = "xpred-sample"

# decode_sample_images=true 时，将 PNG 保存到本地 sample image 目录。
tracker_log_sample_images = false

[sample_compare]
# Debug 对比采样：alpha=0 是 teacher/FM velocity，alpha=1 是 student x-pred 转 velocity。
student_checkpoint = "./anima-xpred-train/xpred-adapter-checkpoint.safetensors"
teacher_checkpoint = "models/anima/diffusion_models/anima-base-v1.0.safetensors"
output_dir = "./anima-jlt-xpred-turbo10-chunks"
